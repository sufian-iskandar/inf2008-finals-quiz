<style>
*{margin:0;padding:0;box-sizing:border-box}:root{--bg:#0a0e17;--sf:#111827;--sf2:#1a2236;--bd:#2a3456;--ac:#22d3ee;--ac2:#a78bfa;--ok:#34d399;--no:#f87171;--tx:#e2e8f0;--td:#64748b;--tb:#f8fafc;--wr:#fbbf24}body{font-family:'Outfit',sans-serif;background:var(--bg);color:var(--tx);min-height:100vh;overflow-x:hidden}body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 20% 50%,rgba(34,211,238,.06),transparent 50%),radial-gradient(ellipse at 80% 20%,rgba(167,139,250,.06),transparent 50%);pointer-events:none;z-index:0}.ct{max-width:820px;margin:0 auto;padding:24px 20px;position:relative;z-index:1}.hd{text-align:center;padding:48px 0 32px}.hd h1{font-size:clamp(1.6rem,4vw,2.4rem);font-weight:900;letter-spacing:-.03em;background:linear-gradient(135deg,var(--ac),var(--ac2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:8px}.hd p{color:var(--td);font-size:.95rem;font-weight:300}.mn{font-family:'JetBrains Mono',monospace}.tg{display:grid;grid-template-columns:1fr;gap:12px;margin:24px 0}@media(min-width:600px){.tg{grid-template-columns:1fr 1fr}}.tc{background:var(--sf);border:1px solid var(--bd);border-radius:12px;padding:20px;cursor:pointer;transition:all .25s;position:relative;overflow:hidden}.tc::before{content:'';position:absolute;top:0;left:0;width:4px;height:100%;background:var(--ac);opacity:0;transition:opacity .25s}.tc:hover{border-color:var(--ac);transform:translateY(-2px);box-shadow:0 8px 32px rgba(34,211,238,.08)}.tc:hover::before,.tc.sl::before{opacity:1}.tc.sl{border-color:var(--ac);background:rgba(34,211,238,.05)}.tc h3{font-size:.95rem;font-weight:700;color:var(--tb);margin-bottom:4px}.tc>span{font-size:.8rem;color:var(--td);font-weight:300}.tn{font-family:'JetBrains Mono',monospace;font-size:.7rem;color:var(--ac);font-weight:700;margin-bottom:6px;display:block}.bt{font-family:'Outfit',sans-serif;font-weight:700;font-size:.95rem;border:none;border-radius:10px;padding:14px 32px;cursor:pointer;transition:all .2s;display:inline-flex;align-items:center;gap:8px}.bp{background:linear-gradient(135deg,var(--ac),#06b6d4);color:var(--bg);box-shadow:0 4px 20px rgba(34,211,238,.25)}.bp:hover{transform:translateY(-1px);box-shadow:0 6px 28px rgba(34,211,238,.35)}.bp:disabled{opacity:.4;cursor:not-allowed;transform:none;box-shadow:none}.bs{background:var(--sf2);color:var(--tx);border:1px solid var(--bd)}.bs:hover{border-color:var(--ac);color:var(--ac)}.bg_{display:flex;gap:12px;justify-content:center;margin-top:28px;flex-wrap:wrap}.qh{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px;padding-bottom:16px;border-bottom:1px solid var(--bd)}.qp{font-family:'JetBrains Mono',monospace;font-size:.8rem;color:var(--td)}.qt{font-size:.8rem;color:var(--ac);font-weight:500}.pb{width:100%;height:4px;background:var(--sf2);border-radius:4px;margin-bottom:32px;overflow:hidden}.pf{height:100%;background:linear-gradient(90deg,var(--ac),var(--ac2));border-radius:4px;transition:width .4s}.qc{background:var(--sf);border:1px solid var(--bd);border-radius:16px;padding:32px;margin-bottom:20px;animation:fu .4s}@keyframes fu{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:none}}.qc h2{font-size:1.05rem;font-weight:700;color:var(--tb);line-height:1.6;margin-bottom:24px}.qc code{font-family:'JetBrains Mono',monospace;background:var(--sf2);padding:2px 8px;border-radius:4px;font-size:.85rem;color:var(--ac)}.os{display:flex;flex-direction:column;gap:10px}.op{background:var(--sf2);border:1.5px solid var(--bd);border-radius:10px;padding:14px 18px;cursor:pointer;transition:all .2s;font-size:.93rem;line-height:1.5;display:flex;align-items:flex-start;gap:12px}.op:hover:not(.ds){border-color:rgba(34,211,238,.5);background:rgba(34,211,238,.04)}.ol{font-family:'JetBrains Mono',monospace;font-size:.75rem;font-weight:700;color:var(--td);background:var(--bg);width:26px;height:26px;border-radius:6px;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}.op.ok{border-color:var(--ok);background:rgba(52,211,153,.08)}.op.ok .ol{color:var(--bg);background:var(--ok)}.op.no{border-color:var(--no);background:rgba(248,113,113,.08)}.op.no .ol{color:var(--bg);background:var(--no)}.op.ds{cursor:default}.op.dm{opacity:.45}.ex{margin-top:20px;padding:16px 20px;background:rgba(34,211,238,.04);border:1px solid rgba(34,211,238,.15);border-radius:10px;font-size:.88rem;line-height:1.65;animation:fu .3s}.ex strong{color:var(--ac)}.rs{text-align:center;animation:fu .5s}.sr{width:180px;height:180px;margin:32px auto;position:relative}.sr svg{width:100%;height:100%;transform:rotate(-90deg)}.sr circle{fill:none;stroke-width:8}.sr .bg2{stroke:var(--sf2)}.sr .fg{stroke:var(--ac);stroke-linecap:round;transition:stroke-dashoffset 1.5s}.st{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center}.st .nm{font-size:2.8rem;font-weight:900;color:var(--tb);line-height:1}.st .lb{font-size:.75rem;color:var(--td);margin-top:4px;font-weight:500}.rs h2{font-size:1.5rem;font-weight:900;color:var(--tb);margin-bottom:8px}.gd{font-size:1rem;font-weight:700;padding:6px 16px;border-radius:8px;display:inline-block;margin:12px 0 24px}.gd.a{background:rgba(52,211,153,.12);color:var(--ok)}.gd.b{background:rgba(34,211,238,.12);color:var(--ac)}.gd.c{background:rgba(250,204,21,.12);color:#facc15}.gd.f{background:rgba(248,113,113,.12);color:var(--no)}.tb_{text-align:left;background:var(--sf);border:1px solid var(--bd);border-radius:12px;padding:24px;margin:24px 0}.tb_ h3{font-size:.85rem;font-weight:700;color:var(--td);text-transform:uppercase;letter-spacing:.05em;margin-bottom:16px}.br{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--bd)}.br:last-child{border:none}.br span:first-child{font-size:.88rem}.br span:last-child{font-family:'JetBrains Mono',monospace;font-size:.85rem;font-weight:700}.cl{display:flex;justify-content:space-between;align-items:center;margin:16px 0 4px;flex-wrap:wrap;gap:8px}.sa{font-size:.82rem;color:var(--ac);cursor:pointer;font-weight:500;background:none;border:none;font-family:'Outfit',sans-serif}.sa:hover{text-decoration:underline}.qn{font-family:'JetBrains Mono',monospace;font-size:.78rem;color:var(--td)}.ms-tag{display:inline-block;font-size:.7rem;font-weight:700;color:var(--ac2);background:rgba(167,139,250,.12);padding:3px 10px;border-radius:6px;margin-left:8px;vertical-align:middle}
.op.sel{border-color:var(--ac2);background:rgba(167,139,250,.08)}.op.sel .ol{color:var(--bg);background:var(--ac2)}
.cb{width:16px;height:16px;border:2px solid var(--bd);border-radius:4px;flex-shrink:0;margin-top:3px;display:flex;align-items:center;justify-content:center;transition:all .2s;font-size:10px;color:transparent}
.op.sel .cb{border-color:var(--ac2);background:var(--ac2);color:var(--bg)}
.op.ok .cb{border-color:var(--ok);background:var(--ok);color:var(--bg)}
.op.no .cb{border-color:var(--no);background:var(--no);color:var(--bg)}
.op.dm .cb{opacity:.45}
.sub-btn{font-family:'Outfit',sans-serif;font-weight:700;font-size:.9rem;border:none;border-radius:8px;padding:10px 24px;cursor:pointer;background:var(--ac2);color:var(--bg);margin-top:16px;transition:all .2s;box-shadow:0 2px 12px rgba(167,139,250,.25)}.sub-btn:hover{transform:translateY(-1px);box-shadow:0 4px 16px rgba(167,139,250,.35)}.sub-btn:disabled{opacity:.4;cursor:not-allowed;transform:none;box-shadow:none}
.partial{color:var(--wr);font-weight:bold;}
@media(max-width:480px){.qc{padding:20px}.hd{padding:32px 0 20px}.hd h1{font-size:1.4rem}}
</style>

<div class="ct" id="app"></div>
<script>
const Q=[
// ══════════ WEEK 9: LINEAR MODELS I ══════════
{t: "W09. Linear Models I", tp: "multi", q: "Which of the following statements accurately describe the 'Learning' process in linear models?", o: ["Learning is complete only when the RMSE reaches exactly zero for any given dataset.", "The process involves minimizing a cost function that represents the difference between actual and predicted values.", "Learning involves iteratively adjusting weights and biases to maximize the residual error.", "In a machine learning context, the 'Rules' are the learned mathematical functions that map inputs to outputs.", "It is a search for the specific parameters (m, c) that result in the 'Line of Best Fit.'"], m: [1, 3, 4], e: "ML algorithms 'learn' by calculating error (cost function) and adjusting weights (m) and biases (c) to find the best fit. RMSE almost never reaches exactly zero due to irreducible noise."},
{t: "W09. Linear Models I", tp: "multi", q: "Why do we use squared error?", o: ["To penalize larger errors more heavily", "Because it guarantees zero training error", "Because squaring the error converts regression into classification", "Because it makes the model nonlinear", "To prevent positive and negative errors from cancelling"], m: [0, 4], e: "If you didn't square the errors, a prediction of +5 and -5 would average out to 0 error. Squaring makes all values positive and severely punishes predictions that are way off the mark."},
{t: "W09. Linear Models I", tp: "multi", q: "Which of the following would likely lead to an increase in the Root Mean Squared Error (RMSE) of a linear regression model?", o: ["The model is changed from simple linear regression to multiple linear regression with more relevant features.", "The model parameters (m and c) are perfectly optimized for the training data.", "The data points are highly scattered and do not follow a linear trend.", "There are large outliers in the dataset that are far from the line of best fit.", "The units of the dependent variable are changed (e.g., from meters to millimeters) without scaling the error."], m: [2, 3, 4], e: "RMSE depends on the scale of the target variable. If measured in millimeters instead of meters, the raw number of the RMSE will be 1,000 times larger, even if the predictive power is identical."},
{t: "W09. Linear Models I", tp: "multi", q: "In a simple linear regression model y = mx + c, which of the following statements about the variables and parameters are true?", o: ["If m = 0, the model implies there is no linear relationship between x and y.", "The independent variable is the factor we measure as an outcome of the experiment.", "The dependent variable is typically plotted on the x-axis.", "The parameter c represents the value of the dependent variable when the independent variable is zero.", "The parameter m represents the rate of change of y with respect to x."], m: [0, 3, 4], e: "y is the dependent variable (plotted on the y-axis), and x is the independent variable. m=0 means a flat horizontal line (no relationship)."},
{t: "W09. Linear Models I", tp: "multi", q: "Which of the following are examples of non-linear relationships or functions often used in the transition from linear models to neural networks?", o: ["The identity function f(x) = x.", "A constant pricing model where 1 unit = $5, 2 units = $10, 3 units = $15.", "A model where the output increases exponentially with the input.", "The ReLU (Rectified Linear Unit) function, which outputs zero for negative inputs.", "The Sigmoid function, which squashes values into a range between 0 and 1."], m: [2, 3, 4], e: "The identity function and fixed-rate pricing models are perfectly linear (straight lines). Neural networks require non-linear activations like ReLU and Sigmoid to learn complex patterns."},
{t: "W09. Linear Models I", tp: "multi", q: "If a researcher is using Multiple Linear Regression to predict a student's GPA based on hours studied x1 and hours of sleep (x2), which of the following scenarios are possible?", o: ["The RMSE could be used to compare this model's accuracy against a model that only uses X1.", "The dependent variable (y) in this case would be the number of hours studied.", "The model can perfectly predict every student's GPA as long as enough independent variables are added.", "m1 could be positive (more study leads to higher GPA) while m2 is also positive (more sleep leads to higher GPA).", "The model could find that x2 has a weight of 0, suggesting sleep has no linear impact on GPA in this dataset."], m: [0, 3, 4], e: "The dependent variable (y) is GPA. The model compares weights (m1, m2) to determine the independent impact of study vs sleep on GPA."},

// ══════════ WEEK 10: LINEAR MODELS II ══════════
{t: "W10. Linear Models II", tp: "multi", q: "A neural network contains two layers but only linear activation functions: z1=W1x+b1, y=W2z1+b2. Which statements are correct?", o: ["Decision boundaries remain linear", "A stack of linear layers collapses into a single linear transform", "Stacking linear layers always improves generalisation", "Linear layers introduce non-linearity", "More linear layers do not increase expressiveness"], m: [0, 1, 4], e: "Without non-linear activation functions (like ReLU), chaining 100 layers together mathematically simplifies down to just y = mx + c."},
{t: "W10. Linear Models II", tp: "multi", q: "Why are activation functions used in neural networks?", o: ["They guarantee always-positive gradients", "Without activation functions the network becomes linear", "They allow networks to model complex patterns", "They automatically prevent overfitting", "Activation functions introduce non-linearity"], m: [1, 2, 4], e: "Activation functions provide the non-linearity required to bend and fold decision boundaries around complex data."},
{t: "W10. Linear Models II", tp: "multi", q: "The ReLU activation function is ReLU(z) = max(0, z). Which statements are correct?", o: ["It always prevents dying neurons", "Output range is [0, infinity)", "Gradient is zero for negative inputs", "It avoids saturation for positive inputs", "Output range is (-infinity, infinity)"], m: [1, 2, 3], e: "Because the gradient is 0 for negative numbers, it actually *causes* dying neurons. For positive numbers, the gradient is always 1 (no saturation)."},
{t: "W10. Linear Models II", tp: "multi", q: "Which statements about output activation functions are correct?", o: ["Sigmoid is commonly used for binary classification", "Sigmoid outputs values between 0 and 1", "Softmax outputs probabilities that sum to 1", "Linear activation is used for regression", "Softmax is suitable for multi-label tasks"], m: [0, 1, 2, 3], e: "Softmax is for multi-class (only one correct answer), not multi-label (multiple correct answers, which uses independent sigmoids)."},
{t: "W10. Linear Models II", tp: "multi", q: "Which statements about Multi-Class and Multi-Label are correct?", o: ["Multi-class means exactly one label is correct", "Multi-label often uses independent sigmoids", "Multi-label allows multiple labels per example", "Multi-class typically uses softmax", "Multi-label outputs must sum to 1"], m: [0, 1, 2, 3], e: "Multi-label outputs do NOT sum to 1, because an image could be 90% Cat and 80% Outdoor simultaneously (independent sigmoids)."},
{t: "W10. Linear Models II", tp: "multi", q: "A neural network contains one hidden layer: z = W1x + b1, a = f(z), y = W2a + b2. Which statements are correct?", o: ["If f(z) = z the network is linear", "Activation functions add model non-linearity", "Identity activation introduces strong regularization", "Activation functions increase dataset size", "Non-linear activations allow non-linear decision boundaries"], m: [0, 1, 4], e: "Identity activation f(z)=z means it applies no change, maintaining strict linearity."},
{t: "W10. Linear Models II", tp: "multi", q: "Which choices are reasonable output activations when predicting house prices?", o: ["Softmax", "Sigmoid", "Step function", "Identity f(z) = z", "tanh"], m: [3], e: "House prices are continuous regression values. You do not want to restrict the output to probabilities (Softmax) or a 0-1 scale (Sigmoid)."},
{t: "W10. Linear Models II", tp: "multi", q: "A model produces logits z = [3,1,-1]. After applying softmax, which statements must be true?", o: ["Increasing z1 will decrease the other probabilities", "The probabilities sum to 1", "The probabilities must be evenly spaced", "All probabilities must be greater than zero", "The class with the largest logit will have the largest probability"], m: [0, 1, 3, 4], e: "Softmax forces outputs into a probability distribution. Because they sum to 1, if one logit's share increases, the others must mechanically decrease."},

// ══════════ WEEK 11: UNSUPERVISED LEARNING ══════════
{t: "W11. Unsupervised Learning", tp: "multi", q: "Two points are given: A=(3,5,7) and B=(9,5,9). Which statements are correct?", o: ["Euclidean distance = 40", "Euclidean distance = sqrt(40)", "Manhattan distance = 8", "Chebyshev distance = 8", "Chebyshev distance = 6"], m: [1, 2, 4], e: "Euclidean: sqrt(6^2 + 0^2 + 2^2) = sqrt(40). Manhattan: 6 + 0 + 2 = 8. Chebyshev: max(6, 0, 2) = 6."},
{t: "W11. Unsupervised Learning", tp: "multi", q: "A k-nearest neighbour model uses Age (0-100) and Salary (0-1,000,000). Euclidean distance is used without normalization. Which statements are correct?", o: ["Feature scaling may change the classification result", "Salary differences contribute more to the computed distance than age differences", "Distance-based algorithms are sensitive to feature scale", "Euclidean distance automatically removes scale differences", "Normalizing the features may change which neighbours are selected"], m: [0, 1, 2, 4], e: "Without scaling, a $10,000 salary difference completely overwhelms a 50-year age difference in distance calculations."},
{t: "W11. Unsupervised Learning", tp: "multi", q: "K-Means minimizes the objective function J (within-cluster sum of squares). Which statements are correct?", o: ["Increasing k cannot increase J", "J measures the total squared distance between points and centroids", "The centroid minimizing the objective is the mean of the cluster", "The optimization is based on squared Euclidean distance", "J measures the distance between cluster centroids"], m: [0, 1, 2, 3], e: "J measures points to their OWN centroid, not distances between different centroids. Increasing k always reduces J (eventually hitting 0 when k = N)."},
{t: "W11. Unsupervised Learning", tp: "multi", q: "A dataset contains 120 data points. Which statements are correct?", o: ["Increasing the number of clusters always reduces within-cluster error", "Each data point could theoretically form its own cluster", "The maximum possible number of clusters is 120", "If each point forms its own cluster, the within-cluster distance becomes zero", "The maximum number of clusters is determined by the number of features"], m: [0, 1, 2, 3], e: "The absolute maximum number of clusters is the number of data points. At k=120, every point is its own centroid, meaning distance=0."},
{t: "W11. Unsupervised Learning", tp: "multi", q: "A cluster contains the points (2,4), (4,6), and (6,8). Which statements are correct?", o: ["The centroid is (4,6.5)", "The centroid is the mean of the points", "The centroid is (4,6)", "The centroid must be one of the original data points", "The centroid minimizes the squared distance to cluster points"], m: [1, 2, 4], e: "The centroid is simply the arithmetic mean of all coordinates in the cluster. It does not have to be an actual data point."},
{t: "W11. Unsupervised Learning", tp: "multi", q: "A dataset contains two spiral-shaped clusters. Which statements are correct?", o: ["K-Means may split a spiral incorrectly", "K-Means guarantees correct clustering when k = 2", "DBSCAN may detect the clusters more accurately", "K-Means works best when clusters are compact and spherical", "K-Means assumes clusters are roughly circular around centroids"], m: [0, 2, 3, 4], e: "K-Means fails completely on complex geometrical shapes like spirals because it assumes clusters are spherical regions radiating from a mean."},
{t: "W11. Unsupervised Learning", tp: "multi", q: "DBSCAN uses ε and MinPts. Which statements are correct?", o: ["DBSCAN requires specifying the number of clusters beforehand", "Points that do not belong to any dense region are classified as outliers", "MinPts defines the minimum number of points required to form a dense region", "DBSCAN detects clusters based on density", "ε defines the radius used to search for neighbours"], m: [1, 2, 3, 4], e: "DBSCAN dynamically finds the number of clusters based on density parameters, removing the need to guess 'K' beforehand."},
{t: "W11. Unsupervised Learning", tp: "multi", q: "Suppose ε is set very large in DBSCAN. Which statements are correct?", o: ["The algorithm may fail to separate meaningful clusters", "Many points fall within each other's neighbourhood", "Most points may end up in a single cluster", "Separate clusters may merge together", "The number of clusters always increases"], m: [0, 1, 2, 3], e: "If the radius (ε) is massive, everything is considered a neighbor, collapsing the entire dataset into one giant cluster."},

// ══════════ MIDTERM REVISION: THEORY ══════════
{t: "Midterm: Theory", tp: "multi", q: "You are building a model to predict whether a student will fail a course at the end of the semester. The prediction is made at Week 6. Which features introduce serious validity problems (Target Leakage)?", o: ["risk_flag_assigned_by_advisor", "attendance_rate_first_6_weeks", "major", "final_exam_score", "total_number_of_assignments_submitted"], m: [0, 3], e: "Final exam score happens after Week 6. The risk flag might incorporate future subjective knowledge or proxy data not uniformly available at Week 6."},
{t: "Midterm: Theory", tp: "multi", q: "A hospital dataset contains: patient_id, triage_level (1=critical, 2=urgent, 3=non-urgent), ward_number, body_temperature_celsius, diagnosis_code. Which variables would make taking a mean or variance mathematically invalid or conceptually meaningless?", o: ["triage_level", "diagnosis_code", "ward_number", "body_temperature_celsius", "patient_id"], m: [0, 1, 2, 4], e: "These are nominal/categorical or ordinal identifiers. Taking the average of a diagnosis code or patient ID is mathematically meaningless."},
{t: "Midterm: Theory", tp: "multi", q: "You are training a model to predict apartment rental prices across the entire country. Which conditions could seriously distort model evaluation or interpretation for a nationwide prediction task?", o: ["Majority of listings are 2-bedroom", "Inconsistent encoding of missing size", "Exclusion of non-central districts", "Including price_per_sqm", "Multiple rows per apartment"], m: [1, 2, 3, 4], e: "Excluding non-central districts ruins the 'nationwide' claim. Multiple rows per apartment creates data leakage if identical apartments are in both train and test sets."},
{t: "Midterm: Theory", tp: "multi", q: "Predicting customer lifetime value (CLV) for e-commerce. Evaluated using a random train–test split at the transaction-row level. Which issue is most likely to invalidate the evaluation results?", o: ["marketing_campaign_clicked is binary", "transaction_date is included as a feature", "transaction_amount varies widely", "customer_total_spend uses information beyond the prediction time", "customer_id appears multiple times"], m: [3, 4], e: "Random row-splits on repeated customer_ids guarantees the same customer is in train and test (Leakage). Total spend implies future knowledge."},
{t: "Midterm: Theory", tp: "multi", q: "Your colleague says 'We should immediately tune hyperparameters and try multiple complex models. Baselines are a waste of time.' Which statements correctly justify why a baseline should be built first?", o: ["A baseline provides a minimum performance threshold that more complex models must beat.", "A baseline automatically selects optimal hyperparameters.", "A baseline helps solve the problem immediately.", "A baseline guarantees the final model will not overfit.", "A baseline prevents the need for a validation set."], m: [0], e: "If your complex Neural Network cannot beat a Dummy Classifier predicting the most frequent class, the complex model is useless."},
{t: "Midterm: Theory", tp: "multi", q: "Predicting fraud. Dataset size: 50,000. Fraud rate: 1%. You perform an 80/20 split without stratification. Which risks are realistically possible?", o: ["The test set may contain disproportionately few fraud cases.", "The model will fail to train.", "Performance estimates on the minority class may become unstable.", "Accuracy may appear high even if fraud detection is poor.", "Hyperparameters will change automatically."], m: [0, 2, 3], e: "Without stratification, the 1% minority class might not appear in the test set at all, completely destroying evaluation metrics like Recall."},
{t: "Midterm: Theory", tp: "multi", q: "You instantiate a decision tree: `model = DecisionTreeClassifier(max_depth=4, min_samples_split=10)`. You have not yet called `.fit()`. Which statements are true?", o: ["The learning capacity of the model is already constrained by the chosen hyperparameter values.", "The maximum depth constraint has already been set to 4.", "The model has already analysed the training data to determine optimal splits.", "Internal split thresholds have been optimised using data.", "The structure of the tree (nodes and splits) has not yet been constructed."], m: [0, 1, 4], e: "Hyperparameters set constraints before learning begins. The actual tree structure and splits only form during the `.fit()` command."},
{t: "Midterm: Theory", tp: "multi", q: "Predicting customer churn. 95% Non-churn, 5% Churn. Model A predicts Non-churn for all cases. Model B is a Decision Tree. Both achieve 95% accuracy. Which conclusions are logically justified?", o: ["The decision tree must be overfitting.", "Class imbalance directly affects how accuracy should be interpreted.", "Accuracy alone is insufficient to evaluate performance in this scenario.", "At least one of the two models has 0% recall for the churn class.", "Model A makes exactly 50 classification errors."], m: [1, 2, 3, 4], e: "Because Model A predicts 'Safe' for everyone, it catches 0 defaulters (0% Recall) and makes exactly 50 mistakes (the 5% who actually churned). Accuracy is misleading here."},
{t: "Midterm: Theory", tp: "multi", q: "Decision tree with max_depth=None, min_samples_split=2, min_samples_leaf=1. Which statements must be true?", o: ["A node with 2 samples is eligible to be split if a valid separating feature exists.", "Increasing min_samples_leaf would restrict some splits that are currently allowed.", "The tree will always continue splitting until all leaves are pure.", "The algorithm is allowed to create a leaf containing exactly one sample.", "There is no user-defined limit on the number of sequential splits from root to leaf."], m: [0, 1, 3, 4], e: "These settings describe a fully unpruned tree. It will grow as deep as mathematically possible to isolate single data points, almost guaranteeing high variance/overfitting."},
{t: "Midterm: Theory", tp: "multi", q: "Candidate splits for 100 samples (60A, 40B). Split 1 isolates (30A, 30B) and (30A, 10B). Split 2 perfectly isolates (60A, 0B) and (0A, 40B). Which statements are correct?", o: ["Split 2 achieves zero impurity after the split.", "Split 1 creates at least one perfectly pure child node.", "Split 2 produces lower weighted entropy than Split 1.", "Split 2 produces lower weighted Gini than Split 1.", "Split 1 reduces impurity more than Split 2."], m: [0, 2, 3], e: "Split 2 is a perfect split. All samples are separated by class, meaning Gini and Entropy both reach an absolute minimum of 0."},
{t: "Midterm: Theory", tp: "multi", q: "A decision tree selects the best split at the root, missing a different root split that would have allowed a much better overall tree. Why does this happen?", o: ["The impurity metric is mathematically incorrect.", "Decision trees optimise splits locally rather than globally.", "Trees evaluate all possible future tree configurations before splitting.", "Early splits constrain the structure of later splits.", "Greedy algorithms may miss globally optimal structures."], m: [1, 3, 4], e: "Decision Trees are greedy algorithms. They make the best decision for the *current* step without looking ahead at the global consequences."},
{t: "Midterm: Theory", tp: "multi", q: "A node has 20 Class A, 1 Class B. A candidate split produces Left: 20 A, Right: 1 B. You set min_samples_leaf = 5. Which statement must be true?", o: ["The split will be rejected.", "The split will be accepted because impurity decreases.", "The tree must reduce max_depth instead.", "Entropy becomes irrelevant.", "Gini becomes zero at the right node."], m: [0], e: "Even though the split reduces impurity to 0, the hyperparameter `min_samples_leaf=5` strictly forbids any leaf node from having fewer than 5 samples."},
{t: "Midterm: Theory", tp: "multi", q: "Dataset: 900 Negative cases, 100 Positive cases. Model A predicts all samples as Negative. Which statements must be true?", o: ["Recall (positive class) = 0%", "Accuracy = 90%", "The model makes 100 false negatives.", "Specificity (negative class recall) = 100%", "Balanced accuracy = 50%"], m: [0, 1, 2, 3, 4], e: "Predicting all negative means TP=0, TN=900, FP=0, FN=100. This flawlessly highlights why Accuracy (90%) is a terrible metric for imbalanced classes."},
{t: "Midterm: Theory", tp: "multi", q: "You observe: Training accuracy starts near 100% and decreases slightly. Validation accuracy starts low and increases steadily. The gap between them remains large but narrows slowly. Which interpretations are consistent?", o: ["Increasing model complexity is the first recommended action.", "The model exhibits high variance.", "The model is underfitting.", "The model exhibits low bias.", "Adding more data may reduce generalisation gap."], m: [1, 3, 4], e: "A massive gap between training accuracy (~100%) and validation accuracy is the textbook definition of Overfitting (High Variance, Low Bias)."},
{t: "Midterm: Theory", tp: "multi", q: "Which practices preserve an unbiased estimate of generalisation?", o: ["Using validation data for hyperparameter tuning.", "Selecting the model with best validation performance before touching test data.", "Reporting multiple metrics on the test set without changing the model.", "Performing ablation studies using the test set.", "Using test data once after final model selection."], m: [4], e: "The test set must act as a 'vault'. If you use it to tune hyperparameters or run multiple ablation studies to pick the best model, you have caused evaluation leakage."},
{t: "Midterm: Theory", tp: "multi", q: "You train a shallow decision tree (depth=1). Train Acc: 62%, Val Acc: 60%. Adding more data does not improve performance. Diagnosis?", o: ["Overfitting", "Data leakage", "Test set contamination", "Low bias, high variance", "High bias, low variance"], m: [4], e: "Because the tree is artificially capped at depth=1, it cannot learn the patterns in the data. This causes Underfitting (High Bias, Low Variance)."},
{t: "Midterm: Theory", tp: "multi", q: "You use 5-fold CV. CV average F1 = 0.91, Held-out Test F1 = 0.78. Plausible explanations?", o: ["The CV estimate was optimistic due to limited data.", "The model has zero bias.", "The dataset may have distribution differences between training and test sets.", "The model may have high variance.", "Cross-validation guarantees identical test performance."], m: [0, 2, 3], e: "Cross-validation is an estimate, not a guarantee. The drop in Test F1 suggests the model memorized the CV folds (High Variance) or the Test data looks fundamentally different."},
{t: "Midterm: Theory", tp: "multi", q: "You train 200 deep decision trees using bagging, but disable feature subsampling (max_features = None). You observe minimal improvement over a single tree. Why?", o: ["Variance reduction depends on diversity among trees.", "Strong features may dominate early splits in all trees.", "Bagging primarily targets bias reduction.", "Increasing the number of trees will always fix the issue.", "The trees may be highly correlated."], m: [0, 1, 4], e: "Without feature subsampling, every tree has access to the exact same 'strongest' feature at the root node, resulting in 200 highly correlated, nearly identical trees."},
{t: "Midterm: Theory", tp: "multi", q: "In a Random Forest, each tree is trained on a bootstrap sample of size N drawn from N training points. Which statements must be true?", o: ["OOB samples are drawn without replacement.", "Approximately 63.2% of samples appear at least once in the bootstrap sample.", "Increasing the number of trees changes the 36.8% property for each tree.", "Every training sample will be used in every tree.", "Approximately 36.8% of training samples are out-of-bag (OOB) for a given tree."], m: [1, 4], e: "Because bootstrap samples WITH replacement, the mathematical probability of a specific row being chosen at least once approaches 63.2%, leaving ~36.8% unseen (OOB) for validation."},
{t: "Midterm: Theory", tp: "multi", q: "Which statements about OOB (Out-Of-Bag) estimation are correct?", o: ["OOB prediction for a sample aggregates votes only from trees where it was OOB.", "OOB evaluation uses the same tree that trained on that sample.", "OOB accuracy can be computed without a separate validation split.", "OOB uses only trees that did not see a given sample during training.", "OOB relies on the bootstrap sampling mechanism."], m: [0, 2, 3, 4], e: "OOB acts as a 'free' validation metric. If Row 5 was excluded from Tree A and Tree C, its OOB score is determined exclusively by what A and C predict for it."},
{t: "Midterm: Theory", tp: "multi", q: "Suppose: y_actual = 10, y_pred = 8. Loss = (y_actual − y_pred)². Learning rate = 0.2. Which statements are correct?", o: ["The gradient with respect to y_pred is −4.", "The next prediction becomes 8.8.", "The update magnitude depends on the learning rate.", "The next prediction update moves upward.", "Boosting directly replaces the previous model."], m: [0, 1, 2, 3], e: "Loss calculation derivative mechanics: Grad = -2*(10-8) = -4. Update = y_pred - (LR * Grad) = 8 - (0.2 * -4) = 8.8."},
{t: "Midterm: Theory", tp: "multi", q: "Feature: ZipCode with 500 unique categories. Which consequences are logically consistent with using One-Hot Encoding?", o: ["The curse of dimensionality may affect performance.", "Model training may become slower due to higher dimensionality.", "The resulting representation guarantees better accuracy.", "500 new binary columns will be created.", "The encoding avoids imposing artificial numeric ordering."], m: [0, 1, 3, 4], e: "OHE creates a new column for every unique category. Doing this for 500 Zip Codes massively bloats the dataset size (Curse of Dimensionality)."},
{t: "Midterm: Theory", tp: "multi", q: "Label Encoding: Red=0, Blue=1, Green=2. Which risks are logically possible?", o: ["The model may treat the numeric gaps (2 − 0) as meaningful distance.", "The model may assume Green > Blue > Red in a meaningful way.", "The encoding introduces an artificial ordinal relationship.", "The encoding reduces memory usage compared to one-hot encoding.", "The model will automatically learn that the values are categorical."], m: [0, 1, 2, 3], e: "Label Encoding saves memory compared to OHE, but severely risks confusing Linear Models into thinking Green is mathematically 'worth twice as much' as Blue."},

// ══════════ MIDTERM REVISION: PROGRAMMING ══════════
{t: "Midterm: Programming", tp: "multi", q: "Code Analysis: `scaler.fit(X) ... X_train_scaled = scaler.transform(X_train)`. Which statements are correct?", o: ["This introduces data leakage.", "The model will train successfully.", "The fix is to call scaler.fit(X_train) instead.", "The issue is that scaler was fit before splitting.", "Test performance may appear artificially high."], m: [0, 1, 2, 3, 4], e: "Fitting the scaler on the entire dataset (X) allows the mean/std of the validation data to 'leak' into the training process, falsely inflating test scores."},
{t: "Midterm: Programming", tp: "multi", q: "Code Analysis: `X_filtered = X[X['feature1'] > 0]`, then `model.fit(X_filtered, y)` where y was NOT filtered. Which statements are correct?", o: ["Even if shapes match, rows may no longer correspond correctly.", "This is a form of data leakage.", "This may cause a mismatch in the number of samples.", "The model will automatically realign rows correctly.", "The correct fix is to filter y using the same condition."], m: [0, 2, 4], e: "If you drop rows from X but leave y untouched, their lengths will instantly mismatch and cause a crash. Even if by pure luck they match lengths, the indexes are completely scrambled."},
{t: "Midterm: Programming", tp: "multi", q: "Code Analysis: `X_cat_encoded = encoder.fit_transform(X_cat)`, then slicing X_train and X_test sequentially. Which statements are correct?", o: ["The encoder is fit using both train and test data.", "The slicing approach assumes train/test rows are contiguous.", "The model training will fail due to shape mismatch.", "The correct approach is to fit the encoder on X_train only.", "This introduces data leakage."], m: [0, 1, 3, 4], e: "Never fit_transform on the global dataset before splitting. Also, train_test_split shuffles data by default, making sequential list-slicing completely invalid."},
{t: "Midterm: Programming", tp: "multi", q: "Code Analysis: A For-Loop runs `train_test_split` iterating through 5 different `random_state` seeds, printing the accuracy each time. Which statements are correct?", o: ["Fixing random_state improves model performance.", "Stratification guarantees identical splits across seeds.", "If accuracy varies widely, the model may be sensitive to data partitioning.", "Changing random_state may change train/test composition.", "Variation in accuracy across seeds may indicate model instability."], m: [2, 3, 4], e: "Changing the random_state radically changes which rows go to Train vs Test. If performance swings wildly between seeds, the model is highly unstable."},
{t: "Midterm: Programming", tp: "multi", q: "Code Analysis: A loop tests multiple `max_depth` values, checking `accuracy_score(y_test, model.predict(X_test))` inside the loop, and saves the depth that yields the highest test accuracy. Which statements are correct?", o: ["Using random_state=42 prevents this problem.", "This is a form of data leakage (evaluation leakage), even though no features were leaked.", "There is no error.", "The reported test accuracy is likely optimistically biased.", "This code performs hyperparameter selection using the test set."], m: [1, 3, 4], e: "This is textbook Evaluation Leakage. You must use Cross-Validation on the Training set to pick the best hyperparameters, NOT trial-and-error against the Held-Out Test Set."},

// ══════════ MIDTERM REVISION: CALCULATION ══════════
{t: "Midterm: Calculation", tp: "multi", q: "Based on a 10-sample dataset evenly split (5 Positive, 5 Negative) at the Root Node. Which statements are correct?", o: ["The root node is pure", "Gini(root) = 0.5", "Gini(root) = 1", "Entropy(root) = 1", "Entropy(root) = 0.5"], m: [1, 3], e: "A node split exactly 50/50 is perfectly impure. Gini maxes out at 0.5. Entropy maxes out at 1.0."},
{t: "Midterm: Calculation", tp: "multi", q: "Feature X produces: Node A (4 samples: 3+, 1-) and Node B (6 samples: 2+, 4-). Which statements are correct?", o: ["Entropy(B) ≈ 0.918", "Gini(B) = 0.444", "Gini(A) = 0.375", "Entropy(A) ≈ 0.811", "Node A is pure"], m: [0, 1, 2, 3], e: "Formulas: Gini = 1 - (p_sq + n_sq). Entropy = -p*log2(p) - n*log2(n). Node A is heavily weighted toward positive, but not perfectly pure."},
{t: "Midterm: Calculation", tp: "multi", q: "Feature Y produces: Node Yes (5 samples: 3+, 2-) and Node No (5 samples: 2+, 3-). Which statements are correct?", o: ["Gini(No) = 0.48", "Entropy(Yes) ≈ 0.971", "Entropy(No) ≈ 1", "Both children have identical impurity", "Gini(Yes) = 0.48"], m: [0, 1, 4], e: "Both nodes have a 3/2 ratio, meaning they have the exact same impurity scores. (Entropy No is ~0.971, not 1.0)."},
{t: "Midterm: Calculation", tp: "multi", q: "Feature X produces: Node A (4 samples: 3+, 1-) and Node B (6 samples: 2+, 4-). Calculate Information Gain.", o: ["None of the above", "Information Gain ≈ 0.125", "Information Gain ≈ 0.083", "Weighted Entropy ≈ 0.875", "Weighted Gini ≈ 0.417"], m: [1, 3, 4], e: "Weighted Gini = (4/10 * 0.375) + (6/10 * 0.444) = 0.417. Information gain (Entropy) = Root(1.0) - WeightedEntropy(0.875) = 0.125."},
{t: "Midterm: Calculation", tp: "multi", q: "Feature Y produces: Node Yes (5 samples: 3+, 2-) and Node No (5 samples: 2+, 3-). Calculate Information Gain.", o: ["Split improves over root", "Weighted Gini ≈ 0.48", "Entropy reduction is smaller than for split on X", "Weighted Entropy ≈ 0.971", "Information Gain is zero"], m: [0, 1, 2, 3], e: "Because the weighted Gini (0.48) is lower than the root Gini (0.5), this split does improve over the root, but the reduction is tiny compared to splitting on Feature X."},
{t: "Midterm: Calculation", tp: "multi", q: "Comparing the split on Feature X vs Feature Y from the previous calculations, which statements are correct?", o: ["Gini chooses Feature X", "Both choose Feature Y", "Both choose Feature X", "Entropy chooses Feature X", "They disagree"], m: [0, 2, 3], e: "Feature X provided a much larger reduction in impurity (higher Information Gain) compared to Feature Y. Both Gini and Entropy metrics agree that Feature X is the optimal split."}
];

// Shuffle function
function sh(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]]}return b}

const T=[...new Set(Q.map(x=>x.t))];
let S={s:'home',sl:new Set(T),qs:[],ci:0,an:[],ms:new Set()};

function isM(q){return Array.isArray(q.m)}

function gQ(){return sh(Q.filter(x=>S.sl.has(x.t)))}

// RIGHT-MINUS-WRONG GRADING LOGIC
// Returns a float between 0.0 and 1.0 representing the partial score for a single question.
function cor(q, ans){
    if(!isM(q)) return ans===q.a ? 1 : 0; 
    if(!Array.isArray(ans)) return 0;
    
    const s=new Set(ans), c=new Set(q.m);
    if(c.size===0) return s.size===0?1:0;
    
    let score = 0;
    // Each correctly selected option gives (+ 1 / total_correct)
    // Each incorrectly selected option gives (- 1 / total_correct)
    for(const v of s) {
        if(c.has(v)) score += (1 / c.size);
        else score -= (1 / c.size); 
    }
    
    // Prevent negative scores per question, cap at 1
    return Math.max(0, Math.min(1, score));
}

function r(){const a=document.getElementById('app');({home:rH,quiz:rQ,results:rR})[S.s](a)}

function rH(el){
const al=S.sl.size===T.length,cn=Q.filter(x=>S.sl.has(x.t)).length;
el.innerHTML=`<div class="hd"><h1>INF2008 Machine Learning Finals</h1><p>Interactive Revision (Lectures 1-12 & Labs) · <span class="mn">${Q.length} questions</span></p></div>
<div class="cl"><button class="sa" onclick="tA()">${al?'Deselect All':'Select All'}</button><span class="qn">${cn} questions selected</span></div>
<div class="tg">${T.map(t=>`<div class="tc ${S.sl.has(t)?'sl':''}" onclick="tT('${t}')"><span class="tn">${t.split('.')[0].trim()}</span><h3>${t.split('. ')[1]}</h3><span>${Q.filter(x=>x.t===t).length} questions</span></div>`).join('')}</div>
<div class="bg_"><button class="bt bp" onclick="go()" ${!S.sl.size?'disabled':''}>Start Quiz →</button></div>`}

function rQ(el){
const q=S.qs[S.ci],n=S.qs.length,p=S.ci/n*100,d=S.an[S.ci]!=null,multi=isM(q),u=S.an[S.ci];
const uSet=multi&&Array.isArray(u)?new Set(u):new Set();
const cSet=multi?new Set(q.m):new Set([q.a]);

// Grade classification for UI display
let scoreVal = 0;
let statusText = '';
if(d) {
    scoreVal = cor(q, u);
    if(scoreVal === 1) statusText = '<span style="color:var(--ok)">✓ Perfect (1.0 pt)</span>';
    else if(scoreVal > 0) statusText = `<span class="partial">⚠ Partial (${scoreVal.toFixed(2)} pts)</span>`;
    else statusText = '<span style="color:var(--no)">✗ Incorrect (0.0 pts)</span>';
}

el.innerHTML=`<div class="qh"><span class="qt">${q.t}</span><span class="qp">${S.ci+1}/${n}</span></div>
<div class="pb"><div class="pf" style="width:${p}%"></div></div>
<div class="qc"><h2>${q.q}${multi?'<span class="ms-tag">MULTI-SELECT (Right-Minus-Wrong)</span>':''}</h2><div class="os">${q.o.map((o,i)=>{
let c='op';
if(d){
  c+=' ds';
  if(cSet.has(i))c+=' ok'; // Correct answer highlighted green
  else if(uSet.has(i)&&!cSet.has(i))c+=' no'; // Wrong answer user picked highlighted red
  else c+=' dm'; // Dim unselected wrong answers
}else if(multi&&S.ms.has(i)){c+=' sel'}
return`<div class="${c}" onclick="${multi?(d?'':`mt(${i})`):(`pk(${i})`)}">
${multi?`<span class="cb">${(d?(cSet.has(i)?'✓':(uSet.has(i)?'✗':'')):(S.ms.has(i)?'✓':''))}</span>`:`<span class="ol">${'ABCD'[i]}</span>`}
<span>${o}</span></div>`}).join('')}
${multi&&!d?`<button class="sub-btn" onclick="sm()" ${S.ms.size===0?'disabled':''}>Submit Answer</button>`:''}
</div>
${d?`<div class="ex"><strong>${statusText}</strong> — ${q.e}</div>`:''}</div>
<div class="bg_">${d?(S.ci<n-1?`<button class="bt bp" onclick="nx()">Next →</button>`:`<button class="bt bp" onclick="rs()">Results →</button>`):''}
<button class="bt bs" onclick="rt()">⟲ Restart</button></div>`}

function rR(el){
const n=S.qs.length;

// Accumulate total partial points
let totalPoints = 0;
S.an.forEach((a, i) => { totalPoints += cor(S.qs[i], a); });
totalPoints = Math.round(totalPoints * 100) / 100; // Round to 2 decimals

const p = Math.round((totalPoints / n) * 100); // Percentage
const ci=2*Math.PI*76, of_=ci-p/100*ci;

let gc,gl;if(p>=85){gc='a';gl='Excellent'}else if(p>=70){gc='b';gl='Good'}else if(p>=50){gc='c';gl='Needs Work'}else{gc='f';gl='Review Material'}

const bd={};S.qs.forEach((q,i)=>{if(!bd[q.t])bd[q.t]={c:0,t:0};bd[q.t].t++;bd[q.t].c+=cor(q,S.an[i])});

el.innerHTML=`<div class="rs"><div class="hd"><h1>Quiz Complete</h1></div>
<div class="sr"><svg viewBox="0 0 160 160"><circle class="bg2" cx="80" cy="80" r="76"/><circle class="fg" cx="80" cy="80" r="76" stroke-dasharray="${ci}" stroke-dashoffset="${of_}"/></svg>
<div class="st"><div class="nm">${p}%</div><div class="lb">${totalPoints} / ${n}</div></div></div>
<h2>${gl}</h2><div class="gd ${gc}">${p}% (Right-Minus-Wrong)</div>
<div class="tb_"><h3>Topic Breakdown (Points)</h3>${Object.entries(bd).map(([t,d])=>{
    const roundedScore = Math.round(d.c * 10) / 10;
    const tp=Math.round((d.c/d.t)*100);
    const cl=tp>=80?'var(--ok)':tp>=50?'var(--ac)':'var(--no)';
return`<div class="br"><span>${t}</span><span style="color:${cl}">${roundedScore} / ${d.t} pts</span></div>`}).join('')}</div>
<div class="bg_"><button class="bt bp" onclick="rt()">⟲ Restart</button><button class="bt bs" onclick="hm()">← Topics</button></div></div>`}

function tT(t){S.sl.has(t)?S.sl.delete(t):S.sl.add(t);r()}
function tA(){S.sl=S.sl.size===T.length?new Set():new Set(T);r()}
function go(){S.qs=gQ();S.ci=0;S.an=[];S.ms=new Set();S.s='quiz';r();scrollTo(0,0)}
function pk(i){if(S.an[S.ci]!=null)return;S.an[S.ci]=i;r()}
function mt(i){if(S.an[S.ci]!=null)return;S.ms.has(i)?S.ms.delete(i):S.ms.add(i);r()}
function sm(){if(S.an[S.ci]!=null||S.ms.size===0)return;S.an[S.ci]=[...S.ms];S.ms=new Set();r()}
function nx(){S.ci++;S.ms=new Set();r();scrollTo(0,0)}
function rs(){S.s='results';r();scrollTo(0,0)}
function rt(){S.qs=gQ();S.ci=0;S.an=[];S.ms=new Set();S.s='quiz';r();scrollTo(0,0)}
function hm(){S.s='home';S.ms=new Set();r();scrollTo(0,0)}
r();
</script>
